# DO NOT EDIT -- overwritten on every update.
#
# Workflow customization surface for bmad-copilot-review-closure.

[workflow]

activation_steps_prepend = []
activation_steps_append = []

persistent_facts = [
  "file:{project-root}/**/project-context.md",
  "Process ONLY threads whose first comment author login matches a Copilot reviewer (default: copilot-pull-request-reviewer, Copilot, github-copilot[bot]). Never reply to or resolve human reviewer threads.",
  "When triaging, read the referenced file and diff context before recommending fix vs defer.",
  "Deferrals must include a concrete reason the user confirms — not vague 'later'. Every defer still gets a reply on the Copilot thread and resolveReviewThread — defer never leaves the thread open.",
]

# GitHub logins treated as Copilot reviewers (case-sensitive). Overrides replace the default list.
copilot_author_logins = [
  "copilot-pull-request-reviewer",
  "Copilot",
  "github-copilot[bot]",
]

# Reply template prefix for fixed threads. {summary} is replaced with the fix summary.
fix_reply_template = "Addressed in this change: {summary}"

# Reply template prefix for deferred threads. {reason} is replaced with the defer reason.
defer_reply_template = "Deferred for now: {reason}"

# Language for everything posted publicly to the PR (replies, resolutions).
# Chat with the user still uses {communication_language}; PR threads do not.
reply_language = "en"

# Invisible marker appended to every reply this workflow posts. Step 2 uses it
# to detect prior runs (replied-but-not-resolved threads) and avoid duplicate replies.
reply_marker = "<!-- bmad-copilot-closure -->"

# Test/lint command to run after applying fixes and BEFORE pushing.
# Empty = no gate (the workflow notes that no test command is configured).
# Non-empty = run it; on failure HALT — do not push, do not resolve threads.
test_command = ""

# Jira ticket key pattern, extracted from the branch name / commits / story file.
# Matches any project key (NCC-1234, PLAT-42, ...); narrow per project if needed.
ticket_pattern = '[A-Z][A-Z0-9]+-\d+'

# Commit message template. {pr_number} and {ticket_key} are replaced; if no
# ticket key is found, ask the user for it before committing.
commit_message_template = "fix: address Copilot review comments (#{pr_number}) [{ticket_key}]"

# Push behavior after fixes: "ask" halts for confirmation; "always" pushes without asking.
auto_push = "ask"

on_complete = ""
